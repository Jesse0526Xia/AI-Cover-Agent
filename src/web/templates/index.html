<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI音频Agent - AudioBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 32px;
        }

        .menu {
            flex: 1;
        }

        .menu-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .menu-item.active {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.user .avatar {
            background: #4CAF50;
            color: white;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message.user .message-content {
            background: #4CAF50;
            color: white;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            margin-left: 50px;
            margin-bottom: 20px;
        }

        .typing-indicator.show {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .features {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-top: auto;
        }

        .feature-item {
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feature-icon {
            font-size: 16px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: 100vh;
                width: 100%;
                border-radius: 0;
            }

            .sidebar {
                width: 100%;
                padding: 10px;
                flex-direction: row;
                align-items: center;
                gap: 15px;
            }

            .logo {
                margin-bottom: 0;
                font-size: 18px;
            }

            .menu {
                display: none;
            }

            .features {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
                <span class="logo-icon">🎵</span>
                <span>AudioBot</span>
            </div>
            <div class="menu">
                <div class="menu-item active">
                    <span>💬</span>
                    <span>对话</span>
                </div>
                <div class="menu-item">
                    <span>🎤</span>
                    <span>音色管理</span>
                </div>
                <div class="menu-item">
                    <span>🛠️</span>
                    <span>工具</span>
                </div>
                <div class="menu-item">
                    <span>⚙️</span>
                    <span>设置</span>
                </div>
            </div>
            <div class="features">
                <div class="feature-item">
                    <span class="feature-icon">🎤</span>
                    <span>音色克隆</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🔄</span>
                    <span>音色转换</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🎵</span>
                    <span>音调调节</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🗣️</span>
                    <span>语音合成</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🎶</span>
                    <span>AI歌唱</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🎭</span>
                    <span>情感控制</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>🤖 AI音频助手</h1>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        你好！我是AudioBot，你的AI音频助手。我可以帮你：
                        <br><br>
                        🎤 克隆音色<br>
                        🔄 转换音色<br>
                        🎵 调节音调<br>
                        🗣️ 语音合成<br>
                        🎶 AI歌唱<br>
                        🎭 情感控制<br>
                        <br>
                        请告诉我你需要什么帮助！
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="input-container">
                <input type="text" id="userInput" placeholder="输入你的需求..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                <button class="btn btn-secondary" onclick="clearChat()">清空</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            avatarDiv.textContent = isUser ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content.replace(/\n/g, '<br>');

            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            typingIndicator.classList.add('show');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.classList.remove('show');
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 添加用户消息
            addMessage(message, true);
            userInput.value = '';

            // 显示输入指示器
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                hideTyping();

                if (data.success) {
                    addMessage(data.response, false);
                } else {
                    addMessage('抱歉，处理请求时出错：' + data.error, false);
                }
            } catch (error) {
                hideTyping();
                addMessage('网络错误，请稍后重试', false);
                console.error('Error:', error);
            }
        }

        async function clearChat() {
            try {
                const response = await fetch('/api/clear', {
                    method: 'POST'
                });

                const data = await response.json();

                if (data.success) {
                    chatContainer.innerHTML = `
                        <div class="message bot">
                            <div class="avatar">🤖</div>
                            <div class="message-content">
                                对话历史已清空。请告诉我你需要什么帮助！
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
